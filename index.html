<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rozpoznávač objektů / Object Identfier</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-red: #E63946;
            --hover-red: #C12F3B;
            --bg-white: #FFFFFF;
            --text-dark: #1D3557;
            --gray-light: #F1FAEE;
            --border-gray: #e0e0e0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-white);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* --- Language Switcher --- */
        .lang-switcher {
            margin-bottom: 15px;
            display: flex;
            gap: 5px;
        }
        .lang-btn {
            background: #eee;
            border: 1px solid #ccc;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .lang-btn.active {
            background: var(--primary-red);
            color: white;
            border-color: var(--primary-red);
        }

        main {
            max-width: 650px;
            width: 100%;
            text-align: center;
            background: var(--bg-white);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid var(--border-gray);
        }

        h1 {
            margin-bottom: 10px;
            font-weight: 800;
            color: var(--primary-red);
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .btn, .file-upload-label {
            background-color: var(--primary-red);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            box-shadow: 0 4px 6px rgba(230, 57, 70, 0.15);
        }

        .btn:hover, .file-upload-label:hover {
            background-color: var(--hover-red);
            transform: translateY(-1px);
        }

        .btn-secondary { background-color: #f8f9fa; color: #333; border: 1px solid #ccc; box-shadow: none; }
        .btn-secondary:hover { background-color: #e9ecef; color: #000; }
        .btn-blue { background-color: #457b9d; }
        .btn-blue:hover { background-color: #1d3557; }

        #fileInput { display: none; }

        .preview-container {
            width: 100%; height: 350px; background-color: #fafafa; border-radius: 16px;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
            border: 2px dashed #ddd; position: relative; margin-bottom: 25px;
        }

        #imagePreview, #videoPreview { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }
        #videoPreview { width: 100%; height: 100%; object-fit: cover; }
        .placeholder-text { color: #aaa; font-weight: 500; }
        
        .live-indicator {
            position: absolute; top: 15px; right: 15px; background: rgba(230, 57, 70, 0.85);
            color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem;
            font-weight: 700; display: none; z-index: 10; animation: pulse 2s infinite;
        }

        #resultArea { min-height: 60px; display: flex; flex-direction: column; gap: 10px; justify-content: center; align-items: center; }
        .prediction-box {
            background-color: var(--gray-light); padding: 12px 20px; border-radius: 10px;
            border-left: 4px solid var(--primary-red); text-align: left; width: 100%;
            box-sizing: border-box; animation: fadeIn 0.3s ease-out; display: flex;
            justify-content: space-between; align-items: center;
        }
        .prediction-box.secondary { border-left-color: #aaa; background-color: #fff; border: 1px solid #eee; opacity: 0.9; }
        .prediction-label { font-size: 1rem; font-weight: 700; color: var(--text-dark); }
        .prediction-confidence { font-size: 0.85rem; color: #666; background: rgba(255,255,255,0.8); padding: 2px 6px; border-radius: 4px; }

        .loader {
            border: 3px solid #f3f3f3; border-top: 3px solid var(--primary-red);
            border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: none;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        @media (max-width: 480px) {
            .preview-container { height: 250px; }
            .controls { flex-direction: column; }
            .btn, .file-upload-label { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="lang-switcher">
    <button class="lang-btn active" onclick="setLanguage('cz')">CZ</button>
    <button class="lang-btn" onclick="setLanguage('en')">EN</button>
</div>

<main>
    <h1 id="ui-title">Rozpoznávač objektů</h1>
    <p id="ui-subtitle" class="subtitle">Nahrajte fotku, vložte ji ze schránky (CTRL+V) nebo použijte kameru pro živou detekci.</p>

    <div id="modelStatus">
        <div class="loader" id="mainLoader" style="display: inline-block;"></div>
        <p id="ui-loadingModel" style="margin-top: 10px; font-size: 0.9rem;">Načítám neurální síť...</p>
    </div>

    <div class="controls" id="controlPanel" style="opacity: 0.5; pointer-events: none;">
        <label for="fileInput" class="file-upload-label" id="uploadLabel">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            <span id="ui-btnUpload">Nahrát fotku</span>
        </label>
        <input type="file" id="fileInput" accept="image/*">

        <button id="pasteBtn" class="btn btn-blue">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
            <span id="ui-btnPaste">Vložit ze schránky</span>
        </button>

        <button id="startCameraBtn" class="btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            <span id="ui-btnCamera">Živá kamera</span>
        </button>

        <button id="stopCameraBtn" class="btn btn-secondary" style="display: none;">
            <span id="ui-btnStopCamera">Zastavit kameru</span>
        </button>
    </div>

    <div class="preview-container">
        <div id="liveIndicator" class="live-indicator">LIVE</div>
        <span id="ui-placeholder" class="placeholder-text">Zde se zobrazí náhled</span>
        <img id="imagePreview" alt="Náhled" crossorigin="anonymous">
        <video id="videoPreview" autoplay playsinline muted></video>
    </div>

    <div id="resultArea">
        <div class="loader" id="predictionLoader"></div>
        <div id="predictionResult" style="width: 100%;"></div>
    </div>
</main>

    function translateTerm(term) {
        if (!term) return "";
        if (currentLang === 'en') return term.split(',')[0]; // Pro EN vrátíme původní jméno z AI
        
        let clean = term.toLowerCase().split(',')[0].trim();
        clean = clean.replace(/\s*\(.*\)\s*/g, "");
        return TRANSLATIONS[clean] || (term.charAt(0).toUpperCase() + term.slice(1));
    }

    let net;
    let stream = null;
    let isLive = false;
    let liveInterval = null;
    let lastPrediction = null;

    const fileInput = document.getElementById('fileInput');
    const imagePreview = document.getElementById('imagePreview');
    const videoPreview = document.getElementById('videoPreview');
    const startCameraBtn = document.getElementById('startCameraBtn');
    const stopCameraBtn = document.getElementById('stopCameraBtn');
    const pasteBtn = document.getElementById('pasteBtn');
    const uploadLabel = document.getElementById('uploadLabel');
    const controlPanel = document.getElementById('controlPanel');
    const modelStatus = document.getElementById('modelStatus');
    const predictionResult = document.getElementById('predictionResult');
    const predictionLoader = document.getElementById('predictionLoader');
    const placeholderText = document.getElementById('ui-placeholder');
    const liveIndicator = document.getElementById('liveIndicator');

    async function loadModel() {
        try {
            net = await mobilenet.load({ version: 2, alpha: 1.0 });
            modelStatus.style.display = 'none';
            controlPanel.style.opacity = '1';
            controlPanel.style.pointerEvents = 'auto';
            document.addEventListener('paste', handlePasteEvent);
        } catch (error) {
            modelStatus.innerHTML = '<p style="color:red">Error loading model.</p>';
            console.error(error);
        }
    }
    loadModel();

    async function classify(source) {
        if(!net) return;
        if (!isLive) {
            predictionResult.innerHTML = '';
            predictionLoader.style.display = 'inline-block';
        }
        try {
            const results = await net.classify(source, 5);
            lastPrediction = results;
            renderResults(results);
        } catch (e) {
            console.error(e);
            if (!isLive) predictionLoader.style.display = 'none';
        }
    }

    function renderResults(results) {
        if (!isLive) predictionLoader.style.display = 'none';
        let htmlContent = '';
        if (results && results.length > 0) {
            htmlContent += createResultRow(results[0], true);
            if (results[0].probability < 0.95 && results.length > 1) {
                htmlContent += `<p style="text-align:left; font-size:0.8rem; color:gray; margin: 8px 0 4px;">${UI_TEXTS[currentLang].alternatives}</p>`;
                results.slice(1, 3).forEach(r => {
                    htmlContent += createResultRow(r, false);
                });
            }
        }
        predictionResult.innerHTML = htmlContent;
    }

    function createResultRow(item, primary) {
        const cls = primary ? 'prediction-box' : 'prediction-box secondary';
        return `<div class="${cls}">
                    <span class="prediction-label">${translateTerm(item.className)}</span>
                    <span class="prediction-confidence">${(item.probability * 100).toFixed(1)}%</span>
                </div>`;
    }

    // --- Zbytek logiky (Kamera, Paste, Upload) zůstává stejný ---
    function resetUI() {
        stopCamera();
        imagePreview.style.display = 'none';
        videoPreview.style.display = 'none';
        placeholderText.style.display = 'block';
        liveIndicator.style.display = 'none';
        predictionResult.innerHTML = '';
        lastPrediction = null;
    }

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) processImageFile(file);
    };

    function processImageFile(file) {
        resetUI();
        placeholderText.style.display = 'none';
        const reader = new FileReader();
        reader.onload = (ev) => {
            imagePreview.src = ev.target.result;
            imagePreview.style.display = 'block';
            imagePreview.onload = () => classify(imagePreview);
        };
        reader.readAsDataURL(file);
    }

    pasteBtn.onclick = async () => {
        try {
            const items = await navigator.clipboard.read();
            for (const item of items) {
                const imageType = item.types.find(type => type.startsWith('image/'));
                if (imageType) {
                    const blob = await item.getType(imageType);
                    processImageFile(blob);
                    return;
                }
            }
            alert(UI_TEXTS[currentLang].noImagePaste);
        } catch (err) {
            alert(UI_TEXTS[currentLang].errorPaste);
        }
    };

    function handlePasteEvent(e) {
        if (e.clipboardData && e.clipboardData.items) {
            const items = e.clipboardData.items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    const blob = items[i].getAsFile();
                    processImageFile(blob);
                    e.preventDefault();
                    break;
                }
            }
        }
    }

    startCameraBtn.onclick = async () => {
        resetUI();
        placeholderText.style.display = 'none';
        startCameraBtn.style.display = 'none';
        pasteBtn.style.display = 'none';
        uploadLabel.style.display = 'none';
        stopCameraBtn.style.display = 'inline-flex';
        videoPreview.style.display = 'block';
        liveIndicator.style.display = 'block';
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            videoPreview.srcObject = stream;
            isLive = true;
            videoPreview.onloadeddata = () => {
                predictionResult.innerHTML = `<p style="color:#666">${UI_TEXTS[currentLang].scanning}</p>`;
                liveInterval = setInterval(() => { if (isLive && net) classify(videoPreview); }, 500);
            };
        } catch (e) {
            alert(UI_TEXTS[currentLang].errorCamera);
            stopCamera();
        }
    };

    stopCameraBtn.onclick = stopCamera;

    function stopCamera() {
        isLive = false;
        clearInterval(liveInterval);
        if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
        startCameraBtn.style.display = 'inline-flex';
        pasteBtn.style.display = 'inline-flex';
        uploadLabel.style.display = 'inline-flex';
        stopCameraBtn.style.display = 'none';
        liveIndicator.style.display = 'none';
    }
</script>
